spring:
  application:
    name: deliverybackbone

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:deliverybackbone}
    username: ${DB_USER:delivery}
    password: ${DB_PASSWORD:delivery}

  jpa:
    hibernate:
      ddl-auto: validate   # el esquema lo gobierna Flyway, nunca Hibernate
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC

  flyway:
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8080

app:
  reservation-ttl-minutes: 10   # vida de una reserva de stock sin pagar
  reservation-sweep-ms: 30000   # frecuencia del job que expira reservas vencidas

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
