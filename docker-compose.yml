services:
  postgres:
    image: postgres:16-alpine
    container_name: deliverybackbone-postgres
    environment:
      POSTGRES_DB: deliverybackbone
      POSTGRES_USER: delivery
      POSTGRES_PASSWORD: delivery
    ports:
      - "5434:5432"   # 5434 en el host para no chocar con otros Postgres locales
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U delivery -d deliverybackbone"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: deliverybackbone-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
